<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Treecloud | Initialization</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #ec4899;
            --bg: #0f172a;
            --text: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 3rem;
            border-radius: 2rem;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 1000px;
            width: 90%;
            animation: fadeIn 1.2s ease-out;
            margin: 2rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            text-align: left;
            margin-top: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-5px);
            border-color: rgba(129, 140, 248, 0.4);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.8rem;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #f8fafc;
            line-height: 1.3;
            word-break: break-word;
        }

        .card-stars {
            font-size: 0.85rem;
            color: #fbbf24;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.2rem;
            background: rgba(251, 191, 36, 0.1);
            padding: 0.2rem 0.5rem;
            border-radius: 1rem;
        }

        .card-desc {
            font-size: 0.9rem;
            color: #cbd5e1;
            line-height: 1.5;
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .card-footer {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .card-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #a855f7;
            background: rgba(168, 85, 247, 0.1);
            padding: 0.3rem 0.6rem;
            border-radius: 0.5rem;
            display: inline-block;
            font-weight: 600;
            align-self: flex-start;
        }

        .card-link {
            font-size: 0.85rem;
            color: #818cf8;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            font-weight: 600;
            transition: color 0.2s;
        }

        .card-link:hover {
            color: #c084fc;
        }

        .last-updated {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 2rem;
        }

        .status-badge {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 2rem;
            color: #4ade80;
            font-weight: 500;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-badge">Watcher Agent: Intelligence Mode</div>
        <h1>Treecloud Inspiration</h1>
        <p class="subtitle">Curated open-source intelligence from GitHub Trending.</p>
        
        <div id="data-container" class="data-grid">
            <p style="grid-column: 1/-1; text-align: center; color: #64748b;">Fetching latest intelligence...</p>
        </div>

        <div id="update-time" class="last-updated"></div>
    </div>

    <script>
        async function loadData() {
            try {
                // Ensure we don't hit the browser cache too aggressively
                const response = await fetch('data.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error('Data not found');
                const data = await response.json();
                
                const container = document.getElementById('data-container');
                const updateTime = document.getElementById('update-time');
                
                container.innerHTML = '';
                
                data.items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div>
                            <div class="card-header">
                                <div class="card-title">${item.title}</div>
                                <div class="card-stars">⭐ ${item.stars}</div>
                            </div>
                            <div class="card-desc">${item.description}</div>
                        </div>
                        <div class="card-footer">
                            <div class="card-tag">${item.why_interesting}</div>
                            <a href="${item.link}" target="_blank" class="card-link">Explore Code →</a>
                        </div>
                    `;
                    container.appendChild(card);
                });
                
                const date = new Date(data.last_updated);
                updateTime.textContent = `Intelligence gathered: ${date.toLocaleString()}`;
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('data-container').innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 2rem; background: rgba(239, 68, 68, 0.1); border-radius: 1rem; border: 1px solid rgba(239, 68, 68, 0.3);">
                        <p style="color: #f87171;">Awaiting first intelligence sweep.</p>
                        <p style="font-size: 0.9rem; color: #94a3b8; margin-top: 0.5rem;">The GitHub Action needs to run with the new scraper logic.</p>
                    </div>
                `;
            }
        }

        loadData();
    </script>
</body>
</html>
