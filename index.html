<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Treecloud | Initialization</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #ec4899;
            --bg: #0f172a;
            --text: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 3rem;
            border-radius: 2rem;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 800px;
            width: 90%;
            animation: fadeIn 1.2s ease-out;
            margin: 2rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            text-align: left;
            margin-top: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-5px);
            border-color: rgba(129, 140, 248, 0.4);
        }

        .card-category {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #818cf8;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 400;
            margin-bottom: 1rem;
            color: #f8fafc;
            line-height: 1.4;
        }

        .card-link {
            font-size: 0.85rem;
            color: #c084fc;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-link:hover {
            text-decoration: underline;
        }

        .last-updated {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 2rem;
        }

        .status-badge {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 2rem;
            color: #4ade80;
            font-weight: 500;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-badge">Watcher Agent: Online</div>
        <h1>Treecloud Insights</h1>
        <p class="subtitle">Automated intelligence gathering from the frontier of technology.</p>
        
        <div id="data-container" class="data-grid">
            <!-- Data cards will be injected here -->
            <p style="grid-column: 1/-1; text-align: center; color: #64748b;">Fetching latest data...</p>
        </div>

        <div id="update-time" class="last-updated"></div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('Data not found');
                const data = await response.json();
                
                const container = document.getElementById('data-container');
                const updateTime = document.getElementById('update-time');
                
                container.innerHTML = '';
                
                data.items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="card-category">${item.category}</div>
                        <div class="card-title">${item.title}</div>
                        <a href="${item.link}" target="_blank" class="card-link">Read More →</a>
                    `;
                    container.appendChild(card);
                });
                
                const date = new Date(data.last_updated);
                updateTime.textContent = `Last synchronized: ${date.toLocaleString()}`;
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('data-container').innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 2rem; background: rgba(239, 68, 68, 0.1); border-radius: 1rem; border: 1px solid rgba(239, 68, 68, 0.3);">
                        <p style="color: #f87171;">No data found. The agent needs to run first.</p>
                        <p style="font-size: 0.9rem; color: #94a3b8; margin-top: 0.5rem;">Run 'python watcher.py' to generate the initial data.</p>
                    </div>
                `;
            }
        }

        loadData();
    </script>
</body>
</html>
